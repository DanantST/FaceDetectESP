name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  arduino-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Arduino CLI
        uses: actions/cache@v3
        with:
          path: ~/.arduino15
          key: ${{ runner.os }}-arduino-core-esp32
      - uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
      - name: Compile example
        run: arduino-cli compile --fqbn esp32:esp32:esp32 examples/arduino/FaceDetectESPDemo.ino

  fake-camera-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Arduino CLI
        uses: actions/cache@v3
        with:
          path: ~/.arduino15
          key: ${{ runner.os }}-arduino-core-esp32
      - uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
      - name: Compile FakeCameraAdapter test
        run: arduino-cli compile --fqbn esp32:esp32:esp32 examples/arduino/FakeCameraTest.ino

  espidf-build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.1
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP-IDF example
        working-directory: examples/espidf
        run: |
          idf.py set-target esp32
          idf.py build

  release-version:
    needs: [arduino-build, fake-camera-test, espidf-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set release tag
        run: echo "v$(grep '^version=' library.properties | cut -d'=' -f2)" > release_tag.txt
      - name: Upload release tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tag
          path: release_tag.txt
